<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/9438cc99d7.js"
      crossorigin="anonymous"
    ></script>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <!-- Title -->
    <title>Honda CBR</title>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Header Area Start Here -->
    <header>
      <!-- Banner Area Start Here -->
      <section id="banner-area" class="bg-dark-blue py-5">
        <div class="container px-3 px-sm-0">
          <!-- Row -->
          <div class="row gy-5 align-items-center">
            <!-- Left Side (Text) -->
            <div class="col-md-6 text-light">
              <p class="fw-light mb-1">
                Computer-controlled digital transistorized with electronic
                advance
              </p>
              <h1 class="h2 fw-bold text-white">Honda CBR 300R</h1>
              <p class="fw-light mt-3">
                Amet minim mollit non deserunt ullamco est sit aliqua dolor do
                amet sint. Velit officia consequat duis enim velit mollit.
                Exercitation veniam consequat sunt nostrud amet.
              </p>
              <button
                type="button"
                class="btn bg-orange text-white px-4 mt-2"
                data-bs-toggle="modal"
                data-bs-target="#purchase-modal"
              >
                Purchase
              </button>
            </div>
            <!-- Right Side (Image) -->
            <div class="col-md-6">
              <img src="images/header-bike.png" alt="Bike" class="img-fluid" />
            </div>
          </div>
        </div>
        <!-- Purchase Modal -->
        <div
          class="modal fade"
          id="purchase-modal"
          data-bs-backdrop="static"
          data-bs-keyboard="false"
          tabindex="-1"
          aria-labelledby="purchaseModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="purchaseModalLabel">Modal title</h5>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>
              <div class="modal-body">...</div>
              <div class="modal-footer">
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal"
                >
                  Close
                </button>
                <button type="button" class="btn btn-primary">
                  Understood
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- Banner Area End Here -->
    </header>
    <!-- Header Area End Here -->

    <!-- Main Area Start Here -->
    <main></main>
    <!-- Main Area End Here -->

    <!-- Footer Area Start Here -->
    <footer id="footer-area"></footer>
    <!-- Footer Area End Here -->

    <!-- Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
